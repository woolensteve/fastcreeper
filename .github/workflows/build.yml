name: Build FastCreeper

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn clean package

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: FastCreeper
          path: target/*.jar
